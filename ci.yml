name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend:
    name: Python Backend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test ML engine
      run: |
        python -c "
        from ml_engine import get_detector, predict_anomaly, get_anomaly_score
        detector = get_detector()
        print('ML Engine: OK')

        # Normal traffic — should NOT be anomaly
        result = predict_anomaly(50, 40)
        print(f'Normal traffic anomaly: {result} (expected False)')

        # DDoS traffic — should be anomaly
        result = predict_anomaly(500, 92)
        print(f'DDoS traffic anomaly: {result} (expected True)')

        print('All ML tests passed')
        "

    - name: Test Flask app starts
      run: |
        timeout 8 python app.py &
        sleep 4
        curl -s http://localhost:5000/health | python -c "
        import sys, json
        data = json.load(sys.stdin)
        assert 'status' in data, 'Missing status field'
        assert 'cpu_usage' in data, 'Missing cpu_usage field'
        print('Health endpoint: OK')
        "
        curl -s http://localhost:5000/stats | python -c "
        import sys, json
        data = json.load(sys.stdin)
        assert 'current_limit' in data, 'Missing current_limit'
        print('Stats endpoint: OK')
        "

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm install

    - name: Build
      working-directory: frontend
      run: npm run build

    - name: Check build output
      run: |
        ls frontend/dist/
        echo "Frontend build: OK"
